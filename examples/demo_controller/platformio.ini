; TAKT OS — demo_controller
; Build and flash via the PlatformIO IDE extension in VS Code / Cursor.
;
; PlatformIO panel: Build ✓ | Upload → | Serial Monitor 🔌
;
; Project path: Takt-OS (no spaces — PlatformIO ESP-IDF requirement).

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_speed = 460800
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv

; Uncomment if auto-detection of the port fails:
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
