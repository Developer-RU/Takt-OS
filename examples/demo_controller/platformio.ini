; TAKT OS — demo_controller
; Сборка и прошивка через расширение PlatformIO IDE в VS Code / Cursor.
;
; Панель PlatformIO: Build ✓ | Upload → | Serial Monitor 🔌
;
; Путь к проекту: Takt-OS (без пробелов — требование PlatformIO ESP-IDF).

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_speed = 460800
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = partitions.csv

; Раскомментируйте, если автоопределение порта не срабатывает:
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
