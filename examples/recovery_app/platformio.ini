; TAKT OS — recovery_app (прошивается в раздел recovery @ 0x110000)
; Путь: Takt-OS (без пробелов).

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_speed = 460800
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = ../demo_controller/partitions.csv
board_build.offset = 0x110000
