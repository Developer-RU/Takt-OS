; TAKT OS — recovery_app (flashed to recovery partition @ 0x110000)
; Path: Takt-OS (no spaces).

[platformio]
default_envs = esp32
src_dir = main

[env:esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
upload_speed = 460800
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = ../demo_controller/partitions.csv
board_build.offset = 0x110000
