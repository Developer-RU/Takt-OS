<aside class="sidebar" id="sidebar">
  <a href="{{ '/' | relative_url }}" class="sidebar-brand">
    <img src="{{ '/assets/takt-os-icon.svg' | relative_url }}" alt="TAKT OS" class="sidebar-logo-img" width="36" height="36">
    <span>
      <strong>TAKT OS</strong>
      <small>v{{ site.version }}</small>
    </span>
  </a>
  <nav class="sidebar-nav" aria-label="Documentation">
    {% for item in site.nav %}
      {% if item.external %}
        <a href="{{ item.url }}" class="nav-link nav-external" target="_blank" rel="noopener">{{ item.title }}</a>
      {% else %}
        {% assign item_url = item.url | relative_url %}
        {% assign page_url = page.url | relative_url %}
        <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">{{ item.title }}</a>
      {% endif %}
    {% endfor %}
  </nav>
  <div class="sidebar-footer">
    <a href="{{ site.repo_url }}">GitHub</a>
    · <a href="{{ site.releases_url }}">Releases</a>
    · <a href="{{ site.issues_url }}">Issues</a>
    <br>
    <a href="https://github.com/sponsors/Developer-RU">Sponsor</a>
  </div>
</aside>
